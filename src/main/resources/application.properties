# quarkus config
quarkus.http.enable-compression=true
quarkus.http.port=8080

quarkus.datasource.db-kind = postgresql
quarkus.datasource.username = rickmorty
quarkus.datasource.password = rickmorty
quarkus.datasource.jdbc.url = jdbc:postgresql://localhost:5432/rick-morty

%dev.quarkus.datasource.devservices.enabled=false

%test.quarkus.datasource.db-kind=h2
%test.quarkus.datasource.jdbc.url=jdbc:h2:mem:test
%test.quarkus.datasource.jdbc.driver=org.h2.Driver
%test.quarkus.datasource.devservices.enabled=false
%test.quarkus.hibernate-orm.jdbc.timezone=UTC

# flyway
#quarkus.flyway.clean-at-start=true
quarkus.flyway.migrate-at-start=true
quarkus.flyway.baseline-on-migrate=true

# logging config
quarkus.log.category."org.ivione93".level=INFO

%dev.quarkus.console.color=true
%dev.quarkus.log.console.level=DEBUG
%dev.quarkus.log.console.json=false
%dev.quarkus.log.category."org.ivione93".level=DEBUG
%dev.quarkus.log.category."org.jboss.resteasy.reactive.client.logging".level=DEBUG

%test.quarkus.log.console.json=false
%test.quarkus.log.category."org.ivione93".level=INFO

# rest client
%dev.quarkus.rest-client.logging.scope=request-response
%dev.quarkus.rest-client.logging.body-limit=9999
%dev.quarkus.rest-client.extensions-api.scope=all

quarkus.rest-client.rickmorty.url=https://rickandmortyapi.com
quarkus.rest-client.rickmorty.scope=jakarta.enterprise.context.ApplicationScoped

api.timeout.milliseconds=3000